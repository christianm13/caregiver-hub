<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no"/>
<title>Mama's Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FBF8F3;--plum:#5B4A8A;--plum-light:#7B6AAA;--plum-faint:rgba(91,74,138,.08);--plum-wash:rgba(91,74,138,.15);
  --terra:#C2553D;--terra-light:rgba(194,85,61,.1);--sage:#3D8B6E;--sage-light:rgba(61,139,110,.1);
  --amber:#D4943A;--amber-light:rgba(212,148,58,.1);
  --t1:#2D2A33;--t2:#6B6575;--t3:#9B95A3;--border:rgba(91,74,138,.12);
  --card:#FFF;--shadow:0 1px 3px rgba(45,42,51,.06);--shadow-md:0 4px 12px rgba(45,42,51,.08);
  --r:14px;--rs:10px;--rx:7px;
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body,#root{height:100%;width:100%;font-family:var(--font);background:var(--cream);color:var(--t1);-webkit-font-smoothing:antialiased}
body{overflow:hidden}
input,button,select,textarea{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes checkPop{0%{transform:scale(.8)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.fu{animation:fadeUp .4s ease both}.fi{animation:fadeIn .3s ease both}
.sk{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:pulse 1.5s infinite;border-radius:8px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--plum-wash);border-radius:4px}
.mi{width:100%;border:1px solid var(--border);border-radius:var(--rx);padding:10px 12px;font-size:14px;outline:none;background:var(--cream);transition:border-color .2s;font-family:var(--font)}
.mi:focus{border-color:var(--plum)}.mi-s{padding:8px 10px;font-size:13px}
.ml{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.btn{border:none;border-radius:var(--rs);padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.bp{background:var(--plum);color:#fff}.bs{background:var(--plum-faint);color:var(--plum)}
.bd{background:var(--terra-light);color:var(--terra)}.bg{background:var(--sage);color:#fff}
.bf{width:100%}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.drawer{background:var(--card);border-radius:20px 20px 0 0;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;padding:24px 20px max(20px,env(safe-area-inset-bottom));animation:slideUp .3s ease}
.drawer-h{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const SB_URL='https://iyhwejstekcbudurpckc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5aHdlanN0ZWtjYnVkdXJwY2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDI0OTgsImV4cCI6MjA4ODU3ODQ5OH0.dR6648T2v2NTgXKvCoySf03JYYBnY1040BGd6FdNdpI';
const sb=supabase.createClient(SB_URL,SB_KEY);

/* ─── Helpers ─── */
const $=n=>Number(n||0);
const fmt=n=>$(n).toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0});
const fmt2=n=>$(n).toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2});
const san=s=>(s||'').replace(/\bfather\b/gi,'Spouse').replace(/\bdad\b/gi,'Spouse');
const fmtD=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const fmtDs=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const relD=d=>{if(!d)return'';const now=new Date(),dt=new Date(d),diff=Math.ceil((dt-now)/864e5);
  if(diff<-1)return`${Math.abs(diff)}d overdue`;if(diff<0)return'Yesterday';if(diff===0)return'Today';
  if(diff===1)return'Tomorrow';if(diff<=7)return`In ${diff} days`;return fmtDs(d)};
const greet=()=>{const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening'};
const uCol=u=>u==='urgent'?'var(--terra)':u==='soon'?'var(--amber)':'var(--sage)';
const uBg=u=>u==='urgent'?'var(--terra-light)':u==='soon'?'var(--amber-light)':'var(--sage-light)';

/* ─── Icons ─── */
const I=({n,s=20,c='currentColor'})=>{
  const p={width:s,height:s,viewBox:"0 0 24 24",fill:"none",stroke:c,strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"};
  const m={
    home:<svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    shield:<svg {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    dollar:<svg {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
    check:<svg {...p} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    plus:<svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    arrow:<svg {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
    edit:<svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    x:<svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    chev:<svg {...p}><polyline points="6 9 12 15 18 9"/></svg>,
    trash:<svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
    link:<svg {...p}><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
    bank:<svg {...p}><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>,
    heart:<svg {...p}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
    clipboard:<svg {...p}><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>,
    activity:<svg {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  };
  return m[n]||null;
};

/* ─── Shared UI ─── */
function Card({children,style,onClick,delay=0}){
  return <div className="fu" onClick={onClick} style={{background:'var(--card)',borderRadius:'var(--r)',boxShadow:'var(--shadow)',border:'1px solid var(--border)',padding:20,animationDelay:`${delay}ms`,cursor:onClick?'pointer':'default',...style}}>{children}</div>;
}
function Drawer({open,onClose,title,children}){
  if(!open)return null;
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="drawer"><div className="drawer-h"/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'var(--plum-faint)',border:'none',borderRadius:8,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="x" s={16} c="var(--plum)"/></button></div>{children}</div></div>;
}
function Sec({title,action,onAction,style}){
  return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,...style}}><h3 style={{fontSize:13,fontWeight:700,color:'var(--t2)',letterSpacing:'.05em',textTransform:'uppercase'}}>{title}</h3>{action&&<button onClick={onAction} style={{background:'none',border:'none',color:'var(--plum)',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>{action}</button>}</div>;
}
function PortalBtn({url,label,icon,color}){
  if(!url)return null;
  return <a href={url} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:8,padding:'12px 14px',background:color||'var(--plum-faint)',borderRadius:'var(--rs)',textDecoration:'none',color:'var(--t1)',transition:'opacity .15s'}} onMouseDown={e=>e.currentTarget.style.opacity='.7'} onMouseUp={e=>e.currentTarget.style.opacity='1'}><div style={{width:32,height:32,borderRadius:8,background:'var(--card)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'var(--shadow)'}}>{icon||<I n="link" s={16} c="var(--plum)"/>}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600}}>{label}</div></div><I n="arrow" s={16} c="var(--t3)"/></a>;
}
function Badge({label,color,bg}){
  return <span style={{display:'inline-block',fontSize:11,fontWeight:600,color,background:bg,borderRadius:20,padding:'3px 10px',letterSpacing:'.03em',textTransform:'uppercase'}}>{label}</span>;
}
function ProgressBar({value,max,color='var(--plum)',height=6}){
  const p=max?Math.min(Math.round((value/max)*100),100):0;
  return <div style={{background:'var(--plum-faint)',borderRadius:height,height,width:'100%',overflow:'hidden'}}><div style={{width:`${p}%`,height:'100%',background:color,borderRadius:height,transition:'width .6s ease'}}/></div>;
}

/* ═══════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════ */
function App(){
  const[tab,setTab]=useState('briefing');
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[data,setData]=useState({accounts:[],income_sources:[],policies:[],recurring_bills:[],tasks:[],monthly_snapshots:[],key_dates:[]});
  const[migrated,setMigrated]=useState(false);

  const fetchAll=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const tables=['accounts','income_sources','policies','recurring_bills','tasks','monthly_snapshots','key_dates'];
      const res=await Promise.all(tables.map(t=>sb.from(t).select('*')));
      const fail=res.find(r=>r.error);
      if(fail)throw new Error(fail.error.message);
      const d={};tables.forEach((t,i)=>d[t]=res[i].data||[]);
      setData(d);
    }catch(e){setError(e.message)}
    finally{setLoading(false)}
  },[]);

  /* ── Data corrections (run once) ── */
  const runMigration=useCallback(async(d)=>{
    if(migrated)return;
    try{
      const kd=d.key_dates;
      // Fix "Apply for early retirement" → Mar 29
      const retire=kd.find(k=>/early retirement/i.test(k.title||k.label||''));
      if(retire)await sb.from('key_dates').update({date:'2026-03-29'}).eq('id',retire.id);
      // Fix "POA" → "Power of Attorney setup deadline" → May 29
      const poa=kd.find(k=>/poa/i.test(k.title||k.label||''));
      if(poa)await sb.from('key_dates').update({title:'Power of Attorney setup deadline',label:'Power of Attorney setup deadline',date:'2026-05-29'}).eq('id',poa.id);
      // Remove 2025 tax filing
      const tax=kd.find(k=>/tax filing/i.test(k.title||k.label||''));
      if(tax)await sb.from('key_dates').delete().eq('id',tax.id);
      // Move home insurance purchase → April 14
      const hins=kd.find(k=>/home insurance purchase/i.test(k.title||k.label||''));
      if(hins)await sb.from('key_dates').update({date:'2026-04-14'}).eq('id',hins.id);
      // Add living will + medical will if not exist
      const hasLiving=kd.find(k=>/living will/i.test(k.title||k.label||''));
      if(!hasLiving)await sb.from('key_dates').insert({title:'Living will and testament',date:'2026-05-29'});
      const hasMedical=kd.find(k=>/medical will/i.test(k.title||k.label||''));
      if(!hasMedical)await sb.from('key_dates').insert({title:'Medical will',date:'2026-05-29'});

      setMigrated(true);
      // Re-fetch after migration
      await fetchAll();
    }catch(e){console.error('Migration error:',e);setMigrated(true)}
  },[migrated,fetchAll]);

  useEffect(()=>{fetchAll()},[fetchAll]);
  useEffect(()=>{if(!loading&&!error&&data.key_dates.length>0&&!migrated)runMigration(data)},[loading,error,data,migrated,runMigration]);

  /* ── CRUD ── */
  const upd=async(t,id,u)=>{const{error}=await sb.from(t).update(u).eq('id',id);if(error){alert('Save failed: '+error.message);return false}setData(p=>({...p,[t]:p[t].map(r=>r.id===id?{...r,...u}:r)}));return true};
  const ins=async(t,r)=>{const{data:d,error}=await sb.from(t).insert(r).select().single();if(error){alert('Save failed: '+error.message);return null}setData(p=>({...p,[t]:[...p[t],d]}));return d};
  const del=async(t,id)=>{const{error}=await sb.from(t).delete().eq('id',id);if(error){alert('Delete failed: '+error.message);return false}setData(p=>({...p,[t]:p[t].filter(r=>r.id!==id)}));return true};

  /* ── Computed ── */
  const totBal=useMemo(()=>data.accounts.reduce((s,a)=>s+$(a.balance),0),[data.accounts]);
  const moInc=useMemo(()=>data.income_sources.reduce((s,i)=>s+$(i.amount),0),[data.income_sources]);
  const moBills=useMemo(()=>data.recurring_bills.reduce((s,b)=>s+$(b.amount),0),[data.recurring_bills]);
  const runway=useMemo(()=>{const n=moInc-moBills;return n>0?Math.floor(totBal/n):totBal>0?'∞':0},[totBal,moInc,moBills]);
  const openT=useMemo(()=>data.tasks.filter(t=>t.status!=='done'),[data.tasks]);
  const urgentT=useMemo(()=>openT.filter(t=>t.urgency==='urgent'),[openT]);
  const soonT=useMemo(()=>openT.filter(t=>t.urgency==='soon'),[openT]);

  const tabs=[{id:'briefing',label:'Briefing',icon:'activity'},{id:'coverage',label:'Coverage',icon:'shield'},{id:'finances',label:'Finances',icon:'dollar'},{id:'todo',label:'Tasks',icon:'clipboard'}];
  const dots=useMemo(()=>({briefing:urgentT.length>0,coverage:false,finances:false,todo:openT.length>0}),[urgentT,openT]);

  if(loading)return<div style={{maxWidth:520,margin:'0 auto',padding:'60px 24px',textAlign:'center'}}><div style={{fontSize:32,marginBottom:16}}>💜</div><div style={{fontWeight:600,fontSize:18,color:'var(--plum)',marginBottom:8}}>Mama's Care</div><div style={{color:'var(--t3)',fontSize:14}}>Loading…</div></div>;
  if(error)return<div style={{maxWidth:520,margin:'0 auto',padding:'60px 24px',textAlign:'center'}}><div style={{fontSize:32,marginBottom:16}}>⚠️</div><div style={{fontWeight:600,fontSize:18,color:'var(--terra)',marginBottom:8}}>Connection Issue</div><div style={{color:'var(--t2)',fontSize:14,marginBottom:24}}>{error}</div><button className="btn bp" onClick={fetchAll}>Try Again</button></div>;

  const ctx={data,totBal,moInc,moBills,runway,openT,urgentT,soonT,upd,ins,del,setTab,fetchAll};

  return(
    <div style={{maxWidth:520,margin:'0 auto',height:'100%',display:'flex',flexDirection:'column',background:'var(--cream)',position:'relative'}}>
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden',paddingBottom:80}}>
        {tab==='briefing'&&<BriefingTab {...ctx}/>}
        {tab==='coverage'&&<CoverageTab {...ctx}/>}
        {tab==='finances'&&<FinancesTab {...ctx}/>}
        {tab==='todo'&&<TasksTab {...ctx}/>}
      </div>
      <nav style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(255,255,255,.92)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-around',padding:'8px 0 max(8px,env(safe-area-inset-bottom))',zIndex:100}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:'none',border:'none',cursor:'pointer',padding:'6px 0',color:tab===t.id?'var(--plum)':'var(--t3)',transition:'color .2s'}}>
            <div style={{position:'relative'}}><I n={t.icon} s={22} c={tab===t.id?'var(--plum)':'var(--t3)'}/>{dots[t.id]&&<div style={{position:'absolute',top:-2,right:-4,width:7,height:7,borderRadius:'50%',background:'var(--terra)',border:'2px solid #fff'}}/>}</div>
            <span style={{fontSize:11,fontWeight:tab===t.id?600:500,letterSpacing:'.02em'}}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   BRIEFING TAB — Guided check-in entry point
   ═══════════════════════════════════════════════ */
function BriefingTab({data,totBal,moInc,moBills,runway,openT,urgentT,soonT,upd,setTab}){
  const[checkin,setCheckin]=useState(0); // 0=off, 1-5=steps

  const actionItems=useMemo(()=>[...urgentT,...soonT].slice(0,5),[urgentT,soonT]);
  const upcoming=useMemo(()=>[...data.key_dates].filter(d=>new Date(d.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,6),[data.key_dates]);

  // Gather portal links from accounts and policies
  const bankPortals=useMemo(()=>data.accounts.filter(a=>a.portal_url||a.url).map(a=>({name:san(a.name||a.institution||'Bank'),url:a.portal_url||a.url})),[data.accounts]);
  const insurancePortals=useMemo(()=>data.policies.filter(p=>p.portal_url||p.url).map(p=>({name:san(p.name||p.provider||'Insurance'),url:p.portal_url||p.url})),[data.policies]);

  /* ── Check-in Mode ── */
  if(checkin>0){
    return(
      <div style={{padding:'0 20px 24px'}}>
        <div className="fu" style={{padding:'20px 0 4px'}}>
          <p style={{fontSize:13,color:'var(--t2)'}}>Care Check-In</p>
          <h1 style={{fontSize:22,fontWeight:700,marginTop:2}}>Monthly Review</h1>
        </div>
        {/* Progress */}
        <div style={{display:'flex',gap:4,margin:'12px 0 20px'}}>
          {[1,2,3,4].map(s=><div key={s} style={{flex:1,height:4,borderRadius:4,background:s<=checkin?'var(--plum)':'var(--plum-faint)',transition:'background .3s'}}/>)}
        </div>

        {checkin===1&&(
          <div className="fi">
            <Card style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{width:36,height:36,borderRadius:10,background:'var(--plum-faint)',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="bank" s={18} c="var(--plum)"/></div><div><h3 style={{fontSize:16,fontWeight:700}}>Step 1: Financial Pulse</h3><p style={{fontSize:13,color:'var(--t2)'}}>Verify account balances are current</p></div></div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {data.accounts.map(a=>(
                  <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'var(--cream)',borderRadius:'var(--rx)'}}>
                    <div><div style={{fontSize:14,fontWeight:600}}>{san(a.name||'')}</div><div style={{fontSize:12,color:'var(--t3)'}}>Last updated {a.updated_at?fmtDs(a.updated_at):'never'}</div></div>
                    <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)'}}>{fmt(a.balance)}</div>
                    {(a.portal_url||a.url)&&<a href={a.portal_url||a.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--plum)',fontWeight:600,textDecoration:'none'}}>Verify →</a>}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:14,padding:'12px 14px',background:'var(--plum-faint)',borderRadius:'var(--rx)',display:'flex',justifyContent:'space-between'}}>
                <span style={{fontWeight:600,color:'var(--t2)'}}>Total</span>
                <span style={{fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)',fontSize:18}}>{fmt(totBal)}</span>
              </div>
            </Card>
            <p style={{fontSize:13,color:'var(--t3)',textAlign:'center',marginBottom:12}}>Open each bank portal to confirm balances. Update any that changed in the Finances tab.</p>
          </div>
        )}

        {checkin===2&&(
          <div className="fi">
            <Card style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{width:36,height:36,borderRadius:10,background:'var(--sage-light)',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="shield" s={18} c="var(--sage)"/></div><div><h3 style={{fontSize:16,fontWeight:700}}>Step 2: Bills & Coverage</h3><p style={{fontSize:13,color:'var(--t2)'}}>Check what's due and insurance status</p></div></div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {data.recurring_bills.slice(0,6).map(b=>(
                  <div key={b.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                    <span style={{fontSize:14}}>{san(b.name||b.payee||'')}</span>
                    <span style={{fontFamily:'var(--mono)',fontWeight:600}}>{fmt2(b.amount)}</span>
                  </div>
                ))}
              </div>
              <div style={{marginTop:12,display:'flex',justifyContent:'space-between',fontWeight:700}}>
                <span>Monthly total</span><span style={{fontFamily:'var(--mono)',color:'var(--terra)'}}>{fmt(moBills)}</span>
              </div>
            </Card>
            <p style={{fontSize:13,color:'var(--t3)',textAlign:'center',marginBottom:12}}>Review bills are being paid. Check Coverage tab to update policies and add portal links.</p>
          </div>
        )}

        {checkin===3&&(
          <div className="fi">
            <Card style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{width:36,height:36,borderRadius:10,background:'var(--terra-light)',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="clipboard" s={18} c="var(--terra)"/></div><div><h3 style={{fontSize:16,fontWeight:700}}>Step 3: Action Items</h3><p style={{fontSize:13,color:'var(--t2)'}}>What needs your attention now</p></div></div>
              {actionItems.length>0?actionItems.map(t=>(
                <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:uCol(t.urgency||'normal'),flexShrink:0}}/>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{san(t.title||'')}</div>{t.due_date&&<div style={{fontSize:12,color:uCol(t.urgency||'normal'),fontWeight:600,marginTop:2}}>{relD(t.due_date)}</div>}</div>
                  <button onClick={async()=>await upd('tasks',t.id,{status:'done',completed_at:new Date().toISOString()})} style={{background:'var(--sage-light)',border:'none',borderRadius:6,padding:'6px 12px',fontSize:12,fontWeight:600,color:'var(--sage)',cursor:'pointer'}}>Done</button>
                </div>
              )):<div style={{textAlign:'center',padding:20,color:'var(--sage)'}}><div style={{fontSize:24,marginBottom:4}}>✓</div>No urgent items — you're on track</div>}
            </Card>
          </div>
        )}

        {checkin===4&&(
          <div className="fi">
            <Card style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{width:36,height:36,borderRadius:10,background:'var(--amber-light)',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="activity" s={18} c="var(--amber)"/></div><div><h3 style={{fontSize:16,fontWeight:700}}>Step 4: Looking Ahead</h3><p style={{fontSize:13,color:'var(--t2)'}}>What's coming in the next 90 days</p></div></div>
              {upcoming.map((d,i)=>(
                <div key={d.id||i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none'}}>
                  <div style={{width:40,height:40,borderRadius:'var(--rx)',background:'var(--plum-faint)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontSize:10,fontWeight:600,color:'var(--plum)',textTransform:'uppercase'}}>{new Date(d.date).toLocaleDateString('en-US',{month:'short'})}</span>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--plum)',lineHeight:1}}>{new Date(d.date).getDate()}</span>
                  </div>
                  <div><div style={{fontSize:14,fontWeight:600}}>{san(d.title||d.label||'')}</div><div style={{fontSize:12,color:'var(--t3)' }}>{relD(d.date)}</div></div>
                </div>
              ))}
              {upcoming.length===0&&<div style={{textAlign:'center',padding:20,color:'var(--t3)'}}>No upcoming dates</div>}
            </Card>
            <Card>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--plum)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>Check-In Summary</div>
                <div style={{fontSize:26,fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)'}}>{fmt(totBal)}</div>
                <div style={{fontSize:13,color:'var(--t3)',marginTop:4}}>{typeof runway==='number'?`${runway}mo runway`:'Stable'} · Net {fmt(moInc-moBills)}/mo · {openT.length} open tasks</div>
              </div>
            </Card>
          </div>
        )}

        <div style={{display:'flex',gap:10,marginTop:16}}>
          {checkin>1&&<button className="btn bs" style={{flex:1}} onClick={()=>setCheckin(s=>s-1)}>Back</button>}
          {checkin<4?<button className="btn bp" style={{flex:1}} onClick={()=>setCheckin(s=>s+1)}>Continue</button>
            :<button className="btn bg" style={{flex:1}} onClick={async()=>{
              await ins('monthly_snapshots',{month:new Date().toISOString().slice(0,7),total_balance:totBal,total_income:moInc,total_expenses:moBills,runway_months:typeof runway==='number'?runway:null,created_at:new Date().toISOString()});
              setCheckin(0);
            }}>Save & Finish ✓</button>}
        </div>
        <button onClick={()=>setCheckin(0)} style={{width:'100%',background:'none',border:'none',color:'var(--t3)',fontSize:13,marginTop:12,cursor:'pointer'}}>Exit check-in</button>
      </div>
    );
  }

  /* ── Normal Briefing View ── */
  const statusColor=urgentT.length>0?'var(--terra)':openT.length===0?'var(--sage)':'var(--sage)';
  const statusText=urgentT.length>0?`${urgentT.length} urgent item${urgentT.length>1?'s':''} need attention`:openT.length===0?'All caught up':'On track';

  return(
    <div style={{padding:'0 20px 24px'}}>
      <div className="fu" style={{padding:'20px 0 4px'}}>
        <p style={{fontSize:14,color:'var(--t2)',marginBottom:2}}>{greet()}</p>
        <h1 style={{fontSize:26,fontWeight:700}}>Mama's Care</h1>
      </div>

      {/* Status */}
      <div className="fu" style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',borderRadius:'var(--rs)',background:urgentT.length>0?'var(--terra-light)':'var(--sage-light)',marginBottom:16,animationDelay:'50ms'}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:statusColor,flexShrink:0}}/><span style={{fontSize:13,fontWeight:500,color:statusColor}}>{statusText}</span>
      </div>

      {/* Check-in CTA */}
      <Card delay={100} style={{background:'linear-gradient(135deg,var(--plum) 0%,#7B6AAA 100%)',color:'#fff',border:'none',marginBottom:16,cursor:'pointer'}} onClick={()=>setCheckin(1)}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:44,height:44,borderRadius:12,background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I n="clipboard" s={22} c="#fff"/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:700,lineHeight:1.3}}>Start Care Check-In</div>
            <div style={{fontSize:13,opacity:.8,marginTop:2}}>Review finances, bills, tasks & upcoming dates</div>
          </div>
          <I n="arrow" s={20} c="rgba(255,255,255,.6)"/>
        </div>
      </Card>

      {/* Quick stats */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}} className="fu" >
        {[{l:'Balance',v:fmt(totBal),c:'var(--plum)'},{l:'Runway',v:typeof runway==='number'?`${runway}mo`:String(runway),c:'var(--sage)'},{l:'Action Items',v:actionItems.length,c:actionItems.length>0?'var(--terra)':'var(--sage)'}].map((m,i)=>(
          <div key={i} className="fu" style={{background:'var(--card)',borderRadius:'var(--rs)',padding:'14px 12px',textAlign:'center',border:'1px solid var(--border)',boxShadow:'var(--shadow)',animationDelay:`${200+i*50}ms`}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:4}}>{m.l}</div>
            <div style={{fontSize:20,fontWeight:700,color:m.c,fontFamily:'var(--mono)'}}>{m.v}</div>
          </div>
        ))}
      </div>

      {/* Portal Quick Links */}
      {(bankPortals.length>0||insurancePortals.length>0)&&(
        <>
          <Sec title="Quick Portals"/>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
            {bankPortals.map((p,i)=><PortalBtn key={'b'+i} url={p.url} label={p.name} icon={<I n="bank" s={16} c="var(--plum)"/>} color="var(--plum-faint)"/>)}
            {insurancePortals.map((p,i)=><PortalBtn key={'i'+i} url={p.url} label={p.name} icon={<I n="shield" s={16} c="var(--sage)"/>} color="var(--sage-light)"/>)}
          </div>
        </>
      )}
      {bankPortals.length===0&&insurancePortals.length===0&&(
        <Card delay={300} style={{marginBottom:20,textAlign:'center'}}>
          <div style={{fontSize:13,color:'var(--t2)',marginBottom:10}}>Add portal links to your accounts and policies so you can launch them from here.</div>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            <button className="btn bs" style={{fontSize:13,padding:'8px 16px'}} onClick={()=>setTab('finances')}>Add Bank Links</button>
            <button className="btn bs" style={{fontSize:13,padding:'8px 16px'}} onClick={()=>setTab('coverage')}>Add Insurance Links</button>
          </div>
        </Card>
      )}

      {/* Upcoming */}
      {upcoming.length>0&&(
        <>
          <Sec title="Coming Up"/>
          {upcoming.map((d,i)=>(
            <div key={d.id||i} className="fu" style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 0',borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none',animationDelay:`${400+i*40}ms`}}>
              <div style={{width:40,height:40,borderRadius:'var(--rx)',background:'var(--plum-faint)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontSize:10,fontWeight:600,color:'var(--plum)',textTransform:'uppercase'}}>{new Date(d.date).toLocaleDateString('en-US',{month:'short'})}</span>
                <span style={{fontSize:15,fontWeight:700,color:'var(--plum)',lineHeight:1}}>{new Date(d.date).getDate()}</span>
              </div>
              <div><div style={{fontSize:14,fontWeight:600}}>{san(d.title||d.label||'')}</div><div style={{fontSize:12,color:'var(--t3)',marginTop:2}}>{relD(d.date)}</div></div>
            </div>
          ))}
        </>
      )}

      {/* Tab doorways */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:20}}>
        {[{l:'Coverage',d:'Policies & bills',i:'shield',t:'coverage',c:'var(--plum)'},{l:'Finances',d:'Accounts & income',i:'dollar',t:'finances',c:'var(--sage)'}].map((d,i)=>(
          <Card key={i} delay={500+i*60} onClick={()=>setTab(d.t)} style={{padding:16,cursor:'pointer'}}>
            <div style={{width:32,height:32,borderRadius:8,background:d.c+'18',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8}}><I n={d.i} s={17} c={d.c}/></div>
            <div style={{fontSize:14,fontWeight:600}}>{d.l}</div>
            <div style={{fontSize:12,color:'var(--t3)',marginTop:2}}>{d.d}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COVERAGE TAB
   ═══════════════════════════════════════════════ */
function CoverageTab({data,upd,ins,del}){
  const[ep,setEp]=useState(null);
  const[eb,setEb]=useState(null);
  return(
    <div style={{padding:'0 20px 24px'}}>
      <div className="fu" style={{padding:'20px 24px 0'}}><h1 style={{fontSize:24,fontWeight:700}}>Coverage</h1><p style={{fontSize:14,color:'var(--t2)',marginTop:4}}>Insurance policies & recurring bills</p></div>
      <Sec title="Insurance Policies" style={{marginTop:20}} action={<><I n="plus" s={14} c="var(--plum)"/> Add</>} onAction={()=>setEp('new')}/>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {data.policies.map((p,i)=>{
          const isA=p.status==='expiring'||p.status==='review';
          const dl=p.end_date?Math.max(0,Math.ceil((new Date(p.end_date)-new Date())/864e5)):null;
          const td=(p.start_date&&p.end_date)?Math.max(1,Math.ceil((new Date(p.end_date)-new Date(p.start_date))/864e5)):null;
          const el=td?td-(dl||0):0;
          return(
            <Card key={p.id} delay={i*60}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600}}>{san(p.name||p.type||'Policy')}</div><div style={{fontSize:12,color:'var(--t3)',marginTop:2}}>{p.provider||p.carrier||''}</div></div>
                <div style={{display:'flex',alignItems:'center',gap:6}}><Badge label={isA?'Review':(p.status||'Active')} color={isA?'var(--amber)':'var(--sage)'} bg={isA?'var(--amber-light)':'var(--sage-light)'}/><button onClick={()=>setEp(p)} style={{background:'var(--plum-faint)',border:'none',borderRadius:6,width:28,height:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="edit" s={13} c="var(--plum)"/></button></div>
              </div>
              {p.policy_number&&<div style={{fontSize:12,color:'var(--t3)',fontFamily:'var(--mono)',marginBottom:6}}>#{p.policy_number}</div>}
              <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:13,color:'var(--t2)',marginBottom:8}}>
                {p.premium&&<span>Premium: <strong>{fmt2(p.premium)}</strong>/mo</span>}
                {p.end_date&&<span>Renews: <strong>{fmtD(p.end_date)}</strong></span>}
              </div>
              {td&&dl!==null&&<div style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t3)',marginBottom:4}}><span>Policy period</span><span>{dl}d remaining</span></div><ProgressBar value={el} max={td} color={isA?'var(--amber)':'var(--sage)'}/></div>}
              {(p.portal_url||p.url)&&<a href={p.portal_url||p.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:4,color:'var(--plum)',textDecoration:'none',fontSize:13,fontWeight:600,marginTop:4}}><I n="link" s={13} c="var(--plum)"/> Open Insurance Portal</a>}
            </Card>
          );
        })}
        {data.policies.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:24,fontSize:14}}>No policies on file</div>}
      </div>
      <Sec title="Recurring Bills" style={{marginTop:28}} action={<><I n="plus" s={14} c="var(--plum)"/> Add</>} onAction={()=>setEb('new')}/>
      <Card>
        {data.recurring_bills.map((b,i)=>(
          <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:i<data.recurring_bills.length-1?'1px solid var(--border)':'none'}}>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{san(b.name||b.payee||'Bill')}</div><div style={{fontSize:12,color:'var(--t3)',marginTop:1}}>{b.frequency||'Monthly'}{b.due_date?` · Due ${fmtDs(b.due_date)}`:b.due_day?` · Day ${b.due_day}`:''}{b.category?` · ${b.category}`:''}</div></div>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:15,fontWeight:600,fontFamily:'var(--mono)'}}>{fmt2(b.amount)}</span><button onClick={()=>setEb(b)} style={{background:'var(--plum-faint)',border:'none',borderRadius:6,width:26,height:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="edit" s={12} c="var(--plum)"/></button></div>
          </div>
        ))}
        {data.recurring_bills.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:16,fontSize:14}}>No bills recorded</div>}
        {data.recurring_bills.length>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,fontWeight:600,color:'var(--t2)'}}>Monthly Total</span><span style={{fontSize:17,fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)'}}>{fmt2(data.recurring_bills.reduce((s,b)=>s+$(b.amount),0))}</span></div>}
      </Card>
      <FormDrawer type="policy" open={ep!==null} item={ep==='new'?null:ep} onClose={()=>setEp(null)} onSave={async v=>{if(ep==='new')await ins('policies',v);else await upd('policies',ep.id,v);setEp(null)}} onDelete={ep&&ep!=='new'?async()=>{await del('policies',ep.id);setEp(null)}:null}/>
      <FormDrawer type="bill" open={eb!==null} item={eb==='new'?null:eb} onClose={()=>setEb(null)} onSave={async v=>{if(eb==='new')await ins('recurring_bills',v);else await upd('recurring_bills',eb.id,v);setEb(null)}} onDelete={eb&&eb!=='new'?async()=>{await del('recurring_bills',eb.id);setEb(null)}:null}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   FINANCES TAB
   ═══════════════════════════════════════════════ */
function FinancesTab({data,totBal,moInc,moBills,runway,upd,ins,del}){
  const[ea,setEa]=useState(null);
  const[ei,setEi]=useState(null);
  const accounts=data.accounts,income=data.income_sources;
  return(
    <div style={{padding:'0 20px 24px'}}>
      <div className="fu" style={{padding:'20px 24px 0'}}><h1 style={{fontSize:24,fontWeight:700}}>Finances</h1><p style={{fontSize:14,color:'var(--t2)',marginTop:4}}>Account balances, income & runway</p></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,margin:'16px 0'}} className="fu">
        <div style={{background:'var(--plum)',borderRadius:'var(--rs)',padding:16,color:'#fff'}}><div style={{fontSize:11,fontWeight:600,opacity:.7,textTransform:'uppercase',letterSpacing:'.05em'}}>Total Balance</div><div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)',marginTop:4}}>{fmt(totBal)}</div></div>
        <div style={{background:'var(--sage)',borderRadius:'var(--rs)',padding:16,color:'#fff'}}><div style={{fontSize:11,fontWeight:600,opacity:.7,textTransform:'uppercase',letterSpacing:'.05em'}}>Runway</div><div style={{fontSize:22,fontWeight:700,fontFamily:'var(--mono)',marginTop:4}}>{typeof runway==='number'?`${runway} mo`:runway}</div></div>
      </div>
      <Sec title="Accounts" action={<><I n="plus" s={14} c="var(--plum)"/> Add</>} onAction={()=>setEa('new')}/>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {accounts.map((a,i)=>(
          <Card key={a.id} delay={i*50}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600}}>{san(a.name||'Account')}</div><div style={{fontSize:12,color:'var(--t3)',marginTop:1}}>{a.institution||a.type||''}</div></div>
              <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18,fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)'}}>{fmt(a.balance)}</span><button onClick={()=>setEa(a)} style={{background:'var(--plum-faint)',border:'none',borderRadius:6,width:28,height:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="edit" s={13} c="var(--plum)"/></button></div>
            </div>
            {a.updated_at&&<div style={{fontSize:11,color:'var(--t3)',marginTop:6}}>Updated {fmtDs(a.updated_at)}</div>}
            {(a.portal_url||a.url)&&<a href={a.portal_url||a.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:4,color:'var(--plum)',textDecoration:'none',fontSize:13,fontWeight:600,marginTop:6}}><I n="link" s={13} c="var(--plum)"/> Open Bank Portal</a>}
          </Card>
        ))}
      </div>
      <Sec title="Monthly Income" style={{marginTop:24}} action={<><I n="plus" s={14} c="var(--plum)"/> Add</>} onAction={()=>setEi('new')}/>
      <Card>
        {income.map((inc,i)=>(
          <div key={inc.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<income.length-1?'1px solid var(--border)':'none'}}>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{san(inc.name||inc.source||'')}</div><div style={{fontSize:12,color:'var(--t3)'}}>{inc.type||inc.frequency||''}</div></div>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:15,fontWeight:600,fontFamily:'var(--mono)',color:'var(--sage)'}}>+{fmt2(inc.amount)}</span><button onClick={()=>setEi(inc)} style={{background:'var(--plum-faint)',border:'none',borderRadius:6,width:26,height:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I n="edit" s={12} c="var(--plum)"/></button></div>
          </div>
        ))}
        {income.length>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:4,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,fontWeight:600,color:'var(--t2)'}}>Total Monthly</span><span style={{fontSize:16,fontWeight:700,fontFamily:'var(--mono)',color:'var(--sage)'}}>+{fmt2(moInc)}</span></div>}
      </Card>
      <Sec title="Runway Calculator" style={{marginTop:24}}/>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:14,marginBottom:10}}><span style={{color:'var(--t2)'}}>Monthly income</span><span style={{fontWeight:600,fontFamily:'var(--mono)',color:'var(--sage)'}}>+{fmt(moInc)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:14,marginBottom:10}}><span style={{color:'var(--t2)'}}>Monthly bills</span><span style={{fontWeight:600,fontFamily:'var(--mono)',color:'var(--terra)'}}>-{fmt(moBills)}</span></div>
        <div style={{borderTop:'1px dashed var(--border)',paddingTop:10,display:'flex',justifyContent:'space-between',fontSize:14}}><span style={{color:'var(--t2)'}}>Net monthly</span><span style={{fontWeight:700,fontFamily:'var(--mono)',color:(moInc-moBills)>=0?'var(--sage)':'var(--terra)'}}>{(moInc-moBills)>=0?'+':''}{fmt(moInc-moBills)}</span></div>
        <div style={{background:'var(--plum-faint)',borderRadius:'var(--rs)',padding:14,marginTop:14,textAlign:'center'}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--plum)',textTransform:'uppercase',letterSpacing:'.05em'}}>Financial Runway</div>
          <div style={{fontSize:28,fontWeight:700,fontFamily:'var(--mono)',color:'var(--plum)',marginTop:4}}>{typeof runway==='number'?`${runway} months`:runway}</div>
          <div style={{fontSize:12,color:'var(--t3)',marginTop:4}}>At current spend rate with {fmt(totBal)} in reserves</div>
        </div>
      </Card>
      <FormDrawer type="account" open={ea!==null} item={ea==='new'?null:ea} onClose={()=>setEa(null)} onSave={async v=>{if(ea==='new')await ins('accounts',v);else await upd('accounts',ea.id,{...v,updated_at:new Date().toISOString()});setEa(null)}} onDelete={ea&&ea!=='new'?async()=>{await del('accounts',ea.id);setEa(null)}:null}/>
      <FormDrawer type="income" open={ei!==null} item={ei==='new'?null:ei} onClose={()=>setEi(null)} onSave={async v=>{if(ei==='new')await ins('income_sources',v);else await upd('income_sources',ei.id,v);setEi(null)}} onDelete={ei&&ei!=='new'?async()=>{await del('income_sources',ei.id);setEi(null)}:null}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   TASKS TAB
   ═══════════════════════════════════════════════ */
function TasksTab({data,upd,ins,del}){
  const[filter,setFilter]=useState('all');
  const[showDone,setShowDone]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[et,setEt]=useState(null);
  const[nw,setNw]=useState({title:'',description:'',urgency:'normal',due_date:''});

  const tasks=data.tasks,open=tasks.filter(t=>t.status!=='done'),done=tasks.filter(t=>t.status==='done');
  const filtered=filter==='all'?open:open.filter(t=>t.urgency===filter);
  const grouped=useMemo(()=>{const g={urgent:[],soon:[],normal:[]};filtered.forEach(t=>{(g[t.urgency||'normal']||g.normal).push(t)});return g},[filtered]);

  const toggle=async t=>{const d=t.status==='done';await upd('tasks',t.id,{status:d?'open':'done',completed_at:d?null:new Date().toISOString()})};
  const add=async()=>{if(!nw.title.trim())return;await ins('tasks',{...nw,status:'open',created_at:new Date().toISOString()});setNw({title:'',description:'',urgency:'normal',due_date:''});setShowAdd(false)};

  const fc=[{id:'all',l:'All',c:open.length},{id:'urgent',l:'Urgent',c:open.filter(t=>t.urgency==='urgent').length},{id:'soon',l:'Soon',c:open.filter(t=>t.urgency==='soon').length},{id:'normal',l:'Normal',c:open.filter(t=>t.urgency==='normal').length}];
  const ul={urgent:'Urgent',soon:'Coming Up',normal:'When You Can'};

  return(
    <div style={{padding:'0 20px 24px'}}>
      <div className="fu" style={{padding:'20px 24px 0'}}><h1 style={{fontSize:24,fontWeight:700}}>Tasks</h1><p style={{fontSize:14,color:'var(--t2)',marginTop:4}}>{open.length} open task{open.length!==1?'s':''}</p></div>
      <div style={{display:'flex',gap:8,margin:'16px 0',overflowX:'auto',paddingBottom:4}} className="fu">
        {fc.map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{background:filter===f.id?'var(--plum)':'var(--card)',color:filter===f.id?'#fff':'var(--t2)',border:filter===f.id?'none':'1px solid var(--border)',borderRadius:20,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:5}}>
            {f.l}{f.c>0&&<span style={{background:filter===f.id?'rgba(255,255,255,.25)':'var(--plum-faint)',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:700,color:filter===f.id?'#fff':'var(--plum)'}}>{f.c}</span>}
          </button>
        ))}
      </div>
      {!showAdd?<button onClick={()=>setShowAdd(true)} className="fu" style={{width:'100%',background:'var(--card)',border:'1px dashed var(--border)',borderRadius:'var(--r)',padding:14,fontSize:14,fontWeight:500,color:'var(--plum)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:16}}><I n="plus" s={16} c="var(--plum)"/> Add Task</button>
      :<Card style={{marginBottom:16}}>
        <input value={nw.title} onChange={e=>setNw(t=>({...t,title:e.target.value}))} placeholder="What needs to be done?" autoFocus style={{width:'100%',border:'none',outline:'none',fontSize:15,fontWeight:600,background:'transparent',marginBottom:10}}/>
        <input value={nw.description} onChange={e=>setNw(t=>({...t,description:e.target.value}))} placeholder="Details (optional)" style={{width:'100%',border:'none',outline:'none',fontSize:13,background:'transparent',color:'var(--t2)',marginBottom:14}}/>
        <div style={{display:'flex',gap:8,marginBottom:14}}>{['urgent','soon','normal'].map(u=><button key={u} onClick={()=>setNw(t=>({...t,urgency:u}))} style={{background:nw.urgency===u?uBg(u):'transparent',color:nw.urgency===u?uCol(u):'var(--t3)',border:`1px solid ${nw.urgency===u?uCol(u)+'40':'var(--border)'}`,borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:600,cursor:'pointer',textTransform:'capitalize'}}>{u}</button>)}</div>
        <input type="date" value={nw.due_date} onChange={e=>setNw(t=>({...t,due_date:e.target.value}))} className="mi mi-s" style={{marginBottom:14}}/>
        <div style={{display:'flex',gap:8}}><button className="btn bs" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn bp" style={{flex:1}} onClick={add}>Add Task</button></div>
      </Card>}

      {['urgent','soon','normal'].map(u=>{const items=grouped[u];if(!items||!items.length)return null;return(
        <div key={u} style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:uCol(u)}}><div style={{width:6,height:6,borderRadius:'50%',background:uCol(u)}}/>{ul[u]}<span style={{opacity:.5}}>({items.length})</span></div>
          {items.map((t,i)=><TI key={t.id} t={t} onTog={toggle} onEdit={()=>setEt(t)} d={i*40}/>)}
        </div>
      )})}
      {filtered.length===0&&<div style={{textAlign:'center',color:'var(--t3)',padding:'40px 0'}}><div style={{fontSize:28,marginBottom:8}}>✓</div><div style={{fontSize:15,fontWeight:500}}>{filter==='all'?'All caught up!':`No ${filter} tasks`}</div></div>}
      {done.length>0&&<div style={{marginTop:24}}>
        <button onClick={()=>setShowDone(!showDone)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600,color:'var(--t3)',marginBottom:8,padding:0}}><span style={{transform:showDone?'rotate(0)':'rotate(-90deg)',transition:'transform .2s',display:'flex'}}><I n="chev" s={16} c="var(--t3)"/></span>Completed ({done.length})</button>
        {showDone&&done.map((t,i)=><TI key={t.id} t={t} onTog={toggle} onEdit={()=>setEt(t)} d={i*30} done/>)}
      </div>}
      <FormDrawer type="task" open={et!==null} item={et} onClose={()=>setEt(null)} onSave={async v=>{await upd('tasks',et.id,v);setEt(null)}} onDelete={async()=>{await del('tasks',et.id);setEt(null)}}/>
    </div>
  );
}

function TI({t,onTog,onEdit,d=0,done=false}){
  const[pop,setPop]=useState(false);
  const go=()=>{if(!done)setPop(true);onTog(t);setTimeout(()=>setPop(false),400)};
  return(
    <div className="fu" style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 14px',marginBottom:6,background:'var(--card)',borderRadius:'var(--rs)',border:'1px solid var(--border)',boxShadow:'var(--shadow)',opacity:done?.5:1,animationDelay:`${d}ms`}}>
      <button onClick={go} style={{width:22,height:22,borderRadius:6,flexShrink:0,marginTop:1,border:done?'none':`2px solid ${uCol(t.urgency||'normal')}`,background:done?'var(--sage)':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',animation:pop?'checkPop .3s ease':'none'}}>{done&&<I n="check" s={14} c="#fff"/>}</button>
      <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={onEdit}>
        <div style={{fontSize:14,fontWeight:done?400:500,textDecoration:done?'line-through':'none',color:done?'var(--t3)':'var(--t1)',lineHeight:1.35}}>{san(t.title||'')}</div>
        {t.description&&!done&&<div style={{fontSize:12,color:'var(--t3)',marginTop:3,lineHeight:1.4}}>{san(t.description)}</div>}
        {t.due_date&&!done&&<div style={{fontSize:11,color:uCol(t.urgency||'normal'),fontWeight:600,marginTop:5}}>{relD(t.due_date)}</div>}
      </div>
      <button onClick={onEdit} style={{background:'none',border:'none',cursor:'pointer',padding:4,flexShrink:0}}><I n="edit" s={14} c="var(--t3)"/></button>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   UNIVERSAL FORM DRAWER
   ═══════════════════════════════════════════════ */
function FormDrawer({type,open,item,onClose,onSave,onDelete}){
  const[f,setF]=useState({});
  useEffect(()=>{
    if(!open)return;
    const defaults={
      policy:{name:'',provider:'',policy_number:'',premium:'',start_date:'',end_date:'',status:'active',portal_url:''},
      bill:{name:'',amount:'',frequency:'Monthly',due_day:'',due_date:'',category:''},
      account:{name:'',institution:'',balance:'',type:'checking',portal_url:''},
      income:{name:'',amount:'',type:'',frequency:'Monthly'},
      task:{title:'',description:'',urgency:'normal',due_date:'',status:'open'},
    };
    setF(item?{...item}:(defaults[type]||{}));
  },[open,item,type]);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  if(!open)return null;
  const titles={policy:item?'Edit Policy':'Add Policy',bill:item?'Edit Bill':'Add Bill',account:item?'Edit Account':'Add Account',income:item?'Edit Income':'Add Income',task:'Edit Task'};

  return(
    <Drawer open={open} onClose={onClose} title={titles[type]||'Edit'}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {type==='policy'&&<>
          <div><label className="ml">Policy Name</label><input className="mi" value={f.name||''} onChange={e=>s('name',e.target.value)} placeholder="e.g. Auto Insurance"/></div>
          <div><label className="ml">Provider</label><input className="mi" value={f.provider||f.carrier||''} onChange={e=>s('provider',e.target.value)} placeholder="e.g. State Farm"/></div>
          <div><label className="ml">Policy Number</label><input className="mi mi-s" value={f.policy_number||''} onChange={e=>s('policy_number',e.target.value)}/></div>
          <div><label className="ml">Monthly Premium</label><input className="mi mi-s" type="number" step="0.01" value={f.premium||''} onChange={e=>s('premium',e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div><label className="ml">Start Date</label><input className="mi mi-s" type="date" value={(f.start_date||'').slice(0,10)} onChange={e=>s('start_date',e.target.value)}/></div><div><label className="ml">Renewal Date</label><input className="mi mi-s" type="date" value={(f.end_date||'').slice(0,10)} onChange={e=>s('end_date',e.target.value)}/></div></div>
          <div><label className="ml">Status</label><select className="mi mi-s" value={f.status||'active'} onChange={e=>s('status',e.target.value)}><option value="active">Active</option><option value="expiring">Expiring</option><option value="review">Needs Review</option><option value="inactive">Inactive</option></select></div>
          <div><label className="ml">🔗 Portal Link</label><input className="mi mi-s" value={f.portal_url||f.url||''} onChange={e=>s('portal_url',e.target.value)} placeholder="https://myinsurance.com/login" type="url"/><div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>Link to manage your policy online</div></div>
        </>}
        {type==='bill'&&<>
          <div><label className="ml">Bill Name</label><input className="mi" value={f.name||f.payee||''} onChange={e=>s('name',e.target.value)} placeholder="e.g. Electric bill"/></div>
          <div><label className="ml">Amount</label><input className="mi" type="number" step="0.01" value={f.amount||''} onChange={e=>s('amount',e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div><label className="ml">Frequency</label><select className="mi mi-s" value={f.frequency||'Monthly'} onChange={e=>s('frequency',e.target.value)}><option>Monthly</option><option>Quarterly</option><option>Annual</option><option>Weekly</option></select></div><div><label className="ml">Due Day</label><input className="mi mi-s" type="number" min="1" max="31" value={f.due_day||''} onChange={e=>s('due_day',parseInt(e.target.value)||'')}/></div></div>
          <div><label className="ml">Next Due Date</label><input className="mi mi-s" type="date" value={(f.due_date||'').slice(0,10)} onChange={e=>s('due_date',e.target.value)}/></div>
          <div><label className="ml">Category</label><input className="mi mi-s" value={f.category||''} onChange={e=>s('category',e.target.value)} placeholder="e.g. Utilities, Medical"/></div>
        </>}
        {type==='account'&&<>
          <div><label className="ml">Account Name</label><input className="mi" value={f.name||''} onChange={e=>s('name',e.target.value)} placeholder="e.g. Main Checking"/></div>
          <div><label className="ml">Institution</label><input className="mi" value={f.institution||''} onChange={e=>s('institution',e.target.value)} placeholder="e.g. Chase"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div><label className="ml">Balance</label><input className="mi" type="number" step="0.01" value={f.balance||''} onChange={e=>s('balance',e.target.value)}/></div><div><label className="ml">Type</label><select className="mi" value={f.type||'checking'} onChange={e=>s('type',e.target.value)}><option value="checking">Checking</option><option value="savings">Savings</option><option value="credit">Credit Card</option><option value="investment">Investment</option><option value="other">Other</option></select></div></div>
          <div><label className="ml">🔗 Bank Portal Link</label><input className="mi mi-s" value={f.portal_url||f.url||''} onChange={e=>s('portal_url',e.target.value)} placeholder="https://mybank.com/login" type="url"/><div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>Quick access to online banking</div></div>
        </>}
        {type==='income'&&<>
          <div><label className="ml">Source Name</label><input className="mi" value={f.name||f.source||''} onChange={e=>s('name',e.target.value)} placeholder="e.g. Social Security"/></div>
          <div><label className="ml">Monthly Amount</label><input className="mi" type="number" step="0.01" value={f.amount||''} onChange={e=>s('amount',e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div><label className="ml">Type</label><input className="mi mi-s" value={f.type||''} onChange={e=>s('type',e.target.value)} placeholder="e.g. Pension"/></div><div><label className="ml">Frequency</label><select className="mi mi-s" value={f.frequency||'Monthly'} onChange={e=>s('frequency',e.target.value)}><option>Monthly</option><option>Bi-weekly</option><option>Weekly</option><option>Quarterly</option><option>Annual</option></select></div></div>
        </>}
        {type==='task'&&<>
          <div><label className="ml">Title</label><input className="mi" value={f.title||''} onChange={e=>s('title',e.target.value)}/></div>
          <div><label className="ml">Description</label><textarea className="mi" rows={3} value={f.description||''} onChange={e=>s('description',e.target.value)} style={{resize:'vertical'}}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div><label className="ml">Urgency</label><select className="mi mi-s" value={f.urgency||'normal'} onChange={e=>s('urgency',e.target.value)}><option value="urgent">Urgent</option><option value="soon">Soon</option><option value="normal">Normal</option></select></div><div><label className="ml">Due Date</label><input className="mi mi-s" type="date" value={(f.due_date||'').slice(0,10)} onChange={e=>s('due_date',e.target.value)}/></div></div>
          <div><label className="ml">Status</label><select className="mi mi-s" value={f.status||'open'} onChange={e=>s('status',e.target.value)}><option value="open">Open</option><option value="in_progress">In Progress</option><option value="done">Done</option></select></div>
        </>}
        <button className="btn bp bf" onClick={()=>onSave(f)} style={{marginTop:6}}>{item?'Save Changes':'Add'}</button>
        {onDelete&&<button className="btn bd bf" onClick={onDelete} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><I n="trash" s={14} c="var(--terra)"/> Delete</button>}
      </div>
    </Drawer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
